<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Amostras - InsoMetric</title>

<style>
body { font-family: Arial; padding: 20px; }
.box { border: 1px solid #ccc; padding: 15px; margin-bottom: 20px; }
input, select { padding: 6px; margin: 5px 0; width: 100%; }
button { padding: 8px 12px; margin-top: 10px; cursor: pointer; }

.resultado { font-weight: bold; margin-top: 10px; }

.tabela { margin-top: 20px; border-collapse: collapse; width: 100%; }
.tabela th, .tabela td {
  border: 1px solid #ccc;
  padding: 8px;
  text-align: center;
}

.nc {
  background-color: #ffdddd;
  font-weight: bold;
}
.ok {
  background-color: #ddffdd;
}

.resumo {
  margin-top: 10px;
  font-weight: bold;
}
</style>

</head>
<body>

<h2>InsoMetric - Análises do Mapeamento</h2>

<div id="info" class="box"></div>

<div class="box">
<h3>Nova Amostra</h3>

<input type="number" step="0.0001" id="pesoInicial" placeholder="Peso Inicial Membrana (g)">
<input type="number" step="0.0001" id="pesoFinal" placeholder="Peso Final Membrana (g)">
<input type="number" step="0.01" id="massa" value="125" placeholder="Massa analisada (g)">

<select id="observacao">
  <option value="Ausente">Ausente</option>
  <option value="Verde discreto">Verde discreto</option>
  <option value="Presença significativa">Presença significativa</option>
</select>

<button onclick="calcular()">Calcular</button>

<div id="resultado" class="resultado"></div>

<button onclick="salvarAmostra()">Salvar Amostra</button>

</div>

<div id="resumo" class="resumo"></div>

<table class="tabela">
<thead>
<tr>
<th>Data</th>
<th>Resultado (mg/kg)</th>
<th>Status</th>
<th>Observação</th>
</tr>
</thead>
<tbody id="listaAmostras"></tbody>
</table>

<br>
<button onclick="voltar()">Voltar</button>

<script type="module">

import { auth, db } from "./js/firebase-config.js";
import { onAuthStateChanged }
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
import {
doc,
getDoc,
collection,
addDoc,
serverTimestamp,
getDocs,
updateDoc
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

const info = document.getElementById("info");
const lista = document.getElementById("listaAmostras");
const resumo = document.getElementById("resumo");

let limiteAtual = 0;
let resultadoCalculado = null;
let statusCalculado = "";

onAuthStateChanged(auth, async (user) => {

if (!user) {
window.location.href = "login.html";
return;
}

const docRef = doc(db, "mapeamentos", id);
const docSnap = await getDoc(docRef);

if (docSnap.exists()) {

const data = docSnap.data();
limiteAtual = data.limite;

info.innerHTML = `
<strong>Armazém:</strong> ${data.armazem}<br>
<strong>Cliente:</strong> ${data.cliente}<br>
<strong>Limite:</strong> ${data.limite} mg/kg<br>
<strong>Analista:</strong> ${data.analista}<br>
<strong>Status:</strong> ${data.status}
`;

carregarAmostras();

} else {
info.innerHTML = "Mapeamento não encontrado.";
}

});

window.calcular = function() {

const pi = parseFloat(document.getElementById("pesoInicial").value);
const pf = parseFloat(document.getElementById("pesoFinal").value);
const massa = parseFloat(document.getElementById("massa").value);

if (isNaN(pi) || isNaN(pf) || isNaN(massa)) {
alert("Preencha todos os campos corretamente.");
return;
}

const residuo = pf - pi;

resultadoCalculado = Math.round((residuo * 1000000) / massa);

statusCalculado = resultadoCalculado > limiteAtual
? "Não Conforme"
: "Conforme";

document.getElementById("resultado").innerHTML =
`Resultado: ${resultadoCalculado} mg/kg → ${statusCalculado}`;
};

window.salvarAmostra = async function() {

if (resultadoCalculado === null) {
alert("Calcule antes de salvar.");
return;
}

await addDoc(collection(db, "mapeamentos", id, "amostras"), {
pesoInicial: parseFloat(document.getElementById("pesoInicial").value),
pesoFinal: parseFloat(document.getElementById("pesoFinal").value),
massa: parseFloat(document.getElementById("massa").value),
resultadoMgKg: resultadoCalculado,
status: statusCalculado,
observacao: document.getElementById("observacao").value,
criadoEm: serverTimestamp()
});

if (statusCalculado === "Não Conforme") {
await updateDoc(doc(db, "mapeamentos", id), {
possuiNC: true
});
}

document.getElementById("pesoInicial").value = "";
document.getElementById("pesoFinal").value = "";
document.getElementById("massa").value = 125;
document.getElementById("resultado").innerHTML = "";

resultadoCalculado = null;

carregarAmostras();
};

async function carregarAmostras() {

lista.innerHTML = "";

const snapshot = await getDocs(collection(db, "mapeamentos", id, "amostras"));

let total = 0;
let totalNC = 0;

snapshot.forEach(docSnap => {

const data = docSnap.data();
total++;

let status = data.status;

// Corrige registros antigos
if (!status) {
status = data.resultadoMgKg > limiteAtual
? "Não Conforme"
: "Conforme";
}

if (status === "Não Conforme") totalNC++;

const classe = status === "Não Conforme" ? "nc" : "ok";

lista.innerHTML += `
<tr class="${classe}">
<td>${data.criadoEm?.toDate().toLocaleString() || "-"}</td>
<td>${data.resultadoMgKg}</td>
<td>${status}</td>
<td>${data.observacao}</td>
</tr>
`;

});

resumo.innerHTML =
`Total de Análises: ${total} | Não Conformes: ${totalNC}`;
}

window.voltar = function() {
window.location.href = "dashboard.html";
};

</script>

</body>
</html>
