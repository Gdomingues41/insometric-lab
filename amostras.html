<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InsoMetric - Análises</title>

<style>
*{box-sizing:border-box}
html,body{margin:0;padding:0;overflow-x:hidden;font-family:Arial}

:root{
--bg:#121212;
--card:#2A2F38;
--text:#EAEAEA;
--input:#1C1F26;
--border:#444;
--primary:#0B3D91;
}

body.light{
--bg:#F4F6F9;
--card:#FFFFFF;
--text:#2C3E50;
--input:#FFFFFF;
--border:#D5D8DC;
--primary:#1B4F72;
}

body{
background:var(--bg);
color:var(--text);
padding:15px;
transition:.3s;
}

.box{
background:var(--card);
padding:18px;
border-radius:10px;
margin-bottom:20px;
}

input,select{
width:100%;
padding:14px;
margin:8px 0;
font-size:16px;
border-radius:8px;
border:1px solid var(--border);
background:var(--input);
color:var(--text);
}

button{
width:100%;
padding:14px;
border:none;
border-radius:8px;
margin-top:10px;
cursor:pointer;
font-weight:bold;
background:var(--primary);
color:white;
}

.delete-btn{
background:#E74C3C;
width:auto;
padding:6px 10px;
font-size:13px;
}

.result-preview{
padding:12px;
margin-top:10px;
border-radius:8px;
font-weight:bold;
}

.ok{background:#1f3a2a;color:#b6ffcf}
.nc{background:#3a1f1f;color:#ffb3b3}

body.light .ok{background:#EAFAF1;color:#1E8449}
body.light .nc{background:#FDEDEC;color:#922B21}

table{
width:100%;
border-collapse:collapse;
font-size:14px;
}

th,td{
padding:10px;
border:1px solid var(--border);
text-align:center;
}

th{
background:var(--primary);
color:white;
}

@media(min-width:768px){
body{max-width:1000px;margin:auto}
}
</style>
</head>

<body>

<h2>📊 InsoMetric - Análises</h2>

<div id="info" class="box"></div>

<div class="box">
<h3>Limite Técnico</h3>
<input type="number" id="limiteInput" placeholder="Limite mg/kg">
<button onclick="atualizarLimite()">Atualizar Limite</button>
</div>

<div class="box">
<h3>Nova Amostra</h3>

<input type="number" step="0.0001" id="pesoInicial" placeholder="Peso Inicial Membrana (g)">
<input type="number" step="0.0001" id="pesoFinal" placeholder="Peso Final Membrana (g)">
<input type="number" step="0.01" id="massa" placeholder="Massa analisada (g)">

<select id="observacao">
<option>Ausente</option>
<option>Presença leve</option>
<option>Presença significativa</option>
</select>

<button onclick="calcularResultado()">Calcular Resultado</button>

<div id="preview" style="display:none" class="result-preview"></div>

<label>Foto Membrana</label>
<input type="file" id="fotoMembrana" accept="image/*" capture="environment">

<label>Foto Béquer</label>
<input type="file" id="fotoBequer" accept="image/*" capture="environment">

<button id="btnSalvar" onclick="salvarAmostra(event)">Salvar Amostra</button>

</div>

<div class="box">
<div id="resumo"></div>

<table>
<thead>
<tr>
<th>Data</th>
<th>mg/kg</th>
<th>Status</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="listaAmostras"></tbody>
</table>
</div>

<button onclick="voltar()">← Voltar</button>

<script type="module">
import { auth, db } from "./js/firebase-config.js";
import { getStorage, ref, uploadBytes, getDownloadURL, deleteObject }
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-storage.js";
import { onAuthStateChanged }
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
import {
doc,getDoc,collection,addDoc,
serverTimestamp,getDocs,updateDoc,deleteDoc
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const storage=getStorage();
const params=new URLSearchParams(window.location.search);
const id=params.get("id");

let limiteAtual=0;
let resultadoCalculado=null;
let statusCalculado=null;

onAuthStateChanged(auth,async(user)=>{
if(!user){window.location.href="login.html";return;}

const snap=await getDoc(doc(db,"mapeamentos",id));
const data=snap.data();
limiteAtual=data.limite;

document.getElementById("limiteInput").value=limiteAtual;

document.getElementById("info").innerHTML=
`<strong>Armazém:</strong> ${data.armazem}<br>
<strong>Cliente:</strong> ${data.cliente}<br>
<strong>Limite:</strong> ${data.limite} mg/kg`;

carregarAmostras();
});

window.atualizarLimite=async function(){
const novo=parseFloat(limiteInput.value);
if(isNaN(novo)){alert("Valor inválido");return;}
await updateDoc(doc(db,"mapeamentos",id),{limite:novo});
limiteAtual=novo;
alert("Limite atualizado.");
};

window.calcularResultado=function(){
const pi=parseFloat(pesoInicial.value);
const pf=parseFloat(pesoFinal.value);
const massa=parseFloat(document.getElementById("massa").value);

if(isNaN(pi)||isNaN(pf)||isNaN(massa)){
alert("Preencha corretamente.");
return;
}

resultadoCalculado=Math.round(((pf-pi)*1000000)/massa);
statusCalculado=resultadoCalculado>limiteAtual?"Não Conforme":"Conforme";

const preview=document.getElementById("preview");
preview.style.display="block";
preview.className="result-preview "+(statusCalculado==="Não Conforme"?"nc":"ok");
preview.innerHTML=
`Resultado: ${resultadoCalculado} mg/kg<br>Status: ${statusCalculado}`;
};

window.salvarAmostra=async function(event){

if(resultadoCalculado===null){
alert("Calcule antes de salvar.");
return;
}

const botao=event.target;
botao.disabled=true;
botao.innerText="Salvando...";

const docRef=await addDoc(
collection(db,"mapeamentos",id,"amostras"),
{
resultadoMgKg:resultadoCalculado,
status:statusCalculado,
criadoEm:serverTimestamp()
});

botao.disabled=false;
botao.innerText="Salvar Amostra";

preview.style.display="none";
resultadoCalculado=null;

carregarAmostras();
};

window.excluirAmostra=async function(amostraId){
if(!confirm("Excluir amostra?"))return;
await deleteDoc(doc(db,"mapeamentos",id,"amostras",amostraId));
carregarAmostras();
};

async function carregarAmostras(){
const snapshot=await getDocs(collection(db,"mapeamentos",id,"amostras"));
const lista=document.getElementById("listaAmostras");
lista.innerHTML="";
let total=0;
let totalNC=0;

snapshot.forEach(docSnap=>{
const d=docSnap.data();
total++;
if(d.status==="Não Conforme")totalNC++;

lista.innerHTML+=`
<tr>
<td>${d.criadoEm?.toDate().toLocaleString()||"-"}</td>
<td>${d.resultadoMgKg}</td>
<td>${d.status}</td>
<td>
<button class="delete-btn"
onclick="excluirAmostra('${docSnap.id}')">🗑</button>
</td>
</tr>`;
});

document.getElementById("resumo").innerHTML=
`Total: ${total} | Não Conformes: ${totalNC}`;
}

window.voltar=()=>window.location.href="dashboard.html";
</script>

<script>
if(localStorage.getItem("theme")==="light"){
document.body.classList.add("light");
}
</script>

</body>
</html>
