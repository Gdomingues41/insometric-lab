<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InsoMetric - Amostras</title>

<style>

/* ===== RESET ===== */
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; overflow-x: hidden; }

/* ===== VARIÁVEIS ===== */
:root {
  --bg: #121212;
  --card: #2A2F38;
  --text: #EAEAEA;
  --input-bg: #1C1F26;
  --border: #444;
  --primary: #0B3D91;
}

body.light {
  --bg: #F4F6F7;
  --card: #ffffff;
  --text: #2C3E50;
  --input-bg: #ffffff;
  --border: #ccc;
  --primary: #1B4F72;
}

body {
  font-family: Arial, sans-serif;
  padding: 15px;
  background-color: var(--bg);
  color: var(--text);
  transition: 0.3s;
}

h2, h3 { margin-bottom: 10px; }

.box {
  background: var(--card);
  padding: 18px;
  border-radius: 10px;
  margin-bottom: 20px;
}

input, select {
  width: 100%;
  padding: 14px;
  margin: 8px 0;
  font-size: 16px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background-color: var(--input-bg);
  color: var(--text);
}

button {
  width: 100%;
  padding: 14px;
  font-size: 16px;
  border-radius: 8px;
  border: none;
  margin-top: 10px;
  cursor: pointer;
  background-color: var(--primary);
  color: white;
  font-weight: bold;
}

button:hover { opacity: 0.9; }

.delete-btn {
  background-color: #E74C3C;
  padding: 6px 10px;
  font-size: 13px;
  width: auto;
}

.status-nc { background-color: #3a1f1f; }
.status-ok { background-color: #1f3a2a; }

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}

th, td {
  padding: 8px;
  border: 1px solid var(--border);
  text-align: center;
}

th {
  background-color: var(--primary);
  color: white;
}

.resumo {
  font-weight: bold;
  margin-bottom: 10px;
}

@media (min-width: 768px) {
  body { max-width: 900px; margin: auto; }
}

</style>
</head>

<body>

<h2>📊 Análises do Mapeamento</h2>

<div id="info" class="box"></div>

<div class="box">
<h3>🔬 Nova Amostra</h3>

<input type="number" step="0.0001" id="pesoInicial" placeholder="Peso Inicial Membrana (g)">
<input type="number" step="0.0001" id="pesoFinal" placeholder="Peso Final Membrana (g)">
<input type="number" step="0.01" id="massa" placeholder="Massa analisada (g)">

<select id="observacao">
  <option value="Ausente">Ausente</option>
  <option value="Presença leve">Presença leve</option>
  <option value="Presença significativa">Presença significativa</option>
</select>

<label>📷 Foto Membrana</label>
<input type="file" id="fotoMembrana" accept="image/*" capture="environment">

<label>📷 Foto Béquer</label>
<input type="file" id="fotoBequer" accept="image/*" capture="environment">

<button id="btnSalvar" onclick="salvarAmostra(event)">Salvar Amostra</button>

</div>

<div class="box">
<div id="resumo" class="resumo"></div>

<table>
<thead>
<tr>
<th>Data</th>
<th>mg/kg</th>
<th>Status</th>
<th>Fotos</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="listaAmostras"></tbody>
</table>
</div>

<button onclick="voltar()">⬅ Voltar</button>

<script type="module">

import { auth, db } from "./js/firebase-config.js";
import { getStorage, ref, uploadBytes, getDownloadURL, deleteObject }
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-storage.js";
import { onAuthStateChanged }
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
import {
doc, getDoc, collection, addDoc,
serverTimestamp, getDocs, updateDoc, deleteDoc
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const storage = getStorage();
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

let limiteAtual = 0;

onAuthStateChanged(auth, async (user) => {
if (!user) {
window.location.href = "login.html";
return;
}

const docSnap = await getDoc(doc(db, "mapeamentos", id));
if (!docSnap.exists()) return;

const data = docSnap.data();
limiteAtual = data.limite;

document.getElementById("info").innerHTML =
`<strong>Armazém:</strong> ${data.armazem}<br>
<strong>Cliente:</strong> ${data.cliente}<br>
<strong>Limite:</strong> ${data.limite} mg/kg`;

carregarAmostras();
});

window.salvarAmostra = async function(event) {

const botao = event.target;
botao.disabled = true;
botao.innerText = "Salvando...";

const pi = parseFloat(pesoInicial.value);
const pf = parseFloat(pesoFinal.value);
const massa = parseFloat(document.getElementById("massa").value);

if (isNaN(pi) || isNaN(pf) || isNaN(massa)) {
alert("Preencha os campos corretamente.");
botao.disabled = false;
botao.innerText = "Salvar Amostra";
return;
}

const resultado = Math.round(((pf - pi) * 1000000) / massa);
const status = resultado > limiteAtual ? "Não Conforme" : "Conforme";

const docRef = await addDoc(
collection(db, "mapeamentos", id, "amostras"),
{
pesoInicial: pi,
pesoFinal: pf,
massa,
resultadoMgKg: resultado,
status,
criadoEm: serverTimestamp()
});

async function uploadFoto(inputId, nomeArquivo) {
const file = document.getElementById(inputId).files[0];
if (!file) return null;
const storageRef = ref(storage,
`mapeamentos/${id}/amostras/${docRef.id}/${nomeArquivo}`);
await uploadBytes(storageRef, file);
return await getDownloadURL(storageRef);
}

const urlMembrana = await uploadFoto("fotoMembrana", "membrana.jpg");
const urlBequer = await uploadFoto("fotoBequer", "bequer.jpg");

await updateDoc(docRef, {
fotoMembrana: urlMembrana,
fotoBequer: urlBequer
});

if (status === "Não Conforme") {
await updateDoc(doc(db, "mapeamentos", id), {
possuiNC: true
});
}

/* Limpar campos */
pesoInicial.value = "";
pesoFinal.value = "";
massa.value = "";
fotoMembrana.value = "";
fotoBequer.value = "";

botao.disabled = false;
botao.innerText = "Salvar Amostra";

carregarAmostras();
};

window.excluirAmostra = async function(amostraId) {

if (!confirm("Excluir esta amostra?")) return;

await deleteDoc(doc(db, "mapeamentos", id, "amostras", amostraId));

try {
await deleteObject(ref(storage,
`mapeamentos/${id}/amostras/${amostraId}/membrana.jpg`));
} catch(e){}

try {
await deleteObject(ref(storage,
`mapeamentos/${id}/amostras/${amostraId}/bequer.jpg`));
} catch(e){}

carregarAmostras();
};

async function carregarAmostras() {

const snapshot = await getDocs(collection(db, "mapeamentos", id, "amostras"));
const lista = document.getElementById("listaAmostras");
lista.innerHTML = "";

let total = 0;
let totalNC = 0;

snapshot.forEach(docSnap => {

const d = docSnap.data();
total++;
if (d.status === "Não Conforme") totalNC++;

const classe = d.status === "Não Conforme" ? "status-nc" : "status-ok";

lista.innerHTML += `
<tr class="${classe}">
<td>${d.criadoEm?.toDate().toLocaleString() || "-"}</td>
<td>${d.resultadoMgKg}</td>
<td>${d.status}</td>
<td>
${d.fotoMembrana ? `<a href="${d.fotoMembrana}" target="_blank">Membrana</a><br>` : ""}
${d.fotoBequer ? `<a href="${d.fotoBequer}" target="_blank">Béquer</a>` : ""}
</td>
<td>
<button class="delete-btn"
onclick="excluirAmostra('${docSnap.id}')">🗑</button>
</td>
</tr>`;
});

document.getElementById("resumo").innerHTML =
`Total: ${total} | Não Conformes: ${totalNC}`;
}

window.voltar = () =>
window.location.href = "dashboard.html";

</script>

<script>
const theme = localStorage.getItem("theme");
if (theme === "light") {
document.body.classList.add("light");
}
</script>

</body>
</html>
