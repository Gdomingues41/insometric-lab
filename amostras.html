<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Amostras - InsoMetric</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    .box { border: 1px solid #ccc; padding: 15px; margin-bottom: 20px; }
    button { padding: 8px 12px; margin-top: 10px; cursor: pointer; }
  </style>
</head>
<body>

  <h2>InsoMetric - Análises do Mapeamento</h2>

  <div id="info" class="box"></div>

  <button onclick="voltar()">Voltar</button>

  <script type="module">
    import { auth, db } from "./js/firebase-config.js";
    import { onAuthStateChanged }
      from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
    import {
      doc,
      getDoc
    } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");

    const info = document.getElementById("info");

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = "login.html";
      } else {
        if (!id) {
          info.innerHTML = "Mapeamento não encontrado.";
          return;
        }

        const docRef = doc(db, "mapeamentos", id);
        const docSnap = await getDoc(docRef);

        if (docSnap.exists()) {
          const data = docSnap.data();
          info.innerHTML = `
            <strong>Armazém:</strong> ${data.armazem}<br>
            <strong>Cliente:</strong> ${data.cliente}<br>
            <strong>Limite:</strong> ${data.limite} mg/kg<br>
            <strong>Analista:</strong> ${data.analista}<br>
            <strong>Status:</strong> ${data.status}
          `;
        } else {
          info.innerHTML = "Mapeamento não encontrado.";
        }
      }
    });

    window.voltar = function() {
      window.location.href = "dashboard.html";
    };
  </script>

</body>
</html>
