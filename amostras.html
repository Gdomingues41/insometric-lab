<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amostras - InsoMetric</title>

<style>
body {
  font-family: Arial, sans-serif;
  padding: 15px;
  margin: 0;
  background-color: #f5f5f5;
}

h2 {
  font-size: 22px;
}

.box {
  background: white;
  border-radius: 8px;
  padding: 15px;
  margin-bottom: 20px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

input, select {
  padding: 12px;
  margin: 8px 0;
  width: 100%;
  font-size: 16px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

button {
  padding: 14px;
  width: 100%;
  font-size: 16px;
  border-radius: 6px;
  border: none;
  background-color: #1976d2;
  color: white;
  margin-top: 10px;
}

button:hover {
  opacity: 0.9;
}

#resultado {
  margin-top: 10px;
  font-weight: bold;
  font-size: 18px;
}

.tabela {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
  font-size: 14px;
}

.tabela th, .tabela td {
  border: 1px solid #ddd;
  padding: 8px;
  text-align: center;
}

.tabela th {
  background-color: #1976d2;
  color: white;
}

.nc {
  background-color: #ffd6d6;
  font-weight: bold;
}

.ok {
  background-color: #d6ffd6;
}

.resumo {
  font-weight: bold;
  margin-bottom: 10px;
  font-size: 16px;
}

a {
  color: #1976d2;
  font-weight: bold;
  text-decoration: none;
}
</style>
</head>

<body>

<h2>📊 Análises do Dia</h2>

<div id="info" class="box"></div>

<div class="box">
<h3>🔬 Nova Amostra</h3>

<input type="number" step="0.0001" id="pesoInicial" placeholder="Peso Inicial Membrana (g)">
<input type="number" step="0.0001" id="pesoFinal" placeholder="Peso Final Membrana (g)">
<input type="number" step="0.01" id="massa" value="125" placeholder="Massa analisada (g)">

<select id="observacao">
  <option value="Ausente">Ausente</option>
  <option value="Verde discreto">Verde discreto</option>
  <option value="Presença significativa">Presença significativa</option>
</select>

<label>📷 Foto Membrana</label>
<input type="file" id="fotoMembrana" accept="image/*" capture="environment">

<label>📷 Foto Béquer</label>
<input type="file" id="fotoBequer" accept="image/*" capture="environment">

<button onclick="calcular()">Calcular</button>
<div id="resultado"></div>

<button onclick="salvarAmostra()">Salvar Amostra</button>

</div>

<div class="box">
<div id="resumo" class="resumo"></div>

<table class="tabela">
<thead>
<tr>
<th>Data</th>
<th>mg/kg</th>
<th>Status</th>
<th>Fotos</th>
</tr>
</thead>
<tbody id="listaAmostras"></tbody>
</table>
</div>

<button onclick="voltar()">⬅ Voltar</button>

<script type="module">
import { auth, db } from "./js/firebase-config.js";
import { getStorage, ref, uploadBytes, getDownloadURL }
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-storage.js";
import { onAuthStateChanged }
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
import {
doc, getDoc, collection, addDoc,
serverTimestamp, getDocs, updateDoc
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const storage = getStorage();
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

let limiteAtual = 0;
let resultadoCalculado = null;
let statusCalculado = "";

onAuthStateChanged(auth, async (user) => {

if (!user) {
window.location.href = "login.html";
return;
}

const docSnap = await getDoc(doc(db, "mapeamentos", id));
if (!docSnap.exists()) return;

const data = docSnap.data();
limiteAtual = data.limite;

document.getElementById("info").innerHTML =
`<strong>Armazém:</strong> ${data.armazem}<br>
<strong>Cliente:</strong> ${data.cliente}<br>
<strong>Limite:</strong> ${data.limite} mg/kg`;

carregarAmostras();
});

window.calcular = function() {
const pi = parseFloat(pesoInicial.value);
const pf = parseFloat(pesoFinal.value);
const massa = parseFloat(document.getElementById("massa").value);

if (isNaN(pi) || isNaN(pf) || isNaN(massa)) return;

resultadoCalculado = Math.round(((pf - pi) * 1000000) / massa);
statusCalculado = resultadoCalculado > limiteAtual ? "Não Conforme" : "Conforme";

document.getElementById("resultado").innerHTML =
`Resultado: ${resultadoCalculado} mg/kg → ${statusCalculado}`;
};

window.salvarAmostra = async function() {

if (resultadoCalculado === null) return;

const docRef = await addDoc(
collection(db, "mapeamentos", id, "amostras"),
{
pesoInicial: parseFloat(pesoInicial.value),
pesoFinal: parseFloat(pesoFinal.value),
massa: parseFloat(document.getElementById("massa").value),
resultadoMgKg: resultadoCalculado,
status: statusCalculado,
criadoEm: serverTimestamp()
});

async function uploadFoto(inputId, nomeArquivo) {
const file = document.getElementById(inputId).files[0];
if (!file) return null;

const storageRef = ref(storage,
`mapeamentos/${id}/amostras/${docRef.id}/${nomeArquivo}`);

await uploadBytes(storageRef, file);
return await getDownloadURL(storageRef);
}

const urlMembrana = await uploadFoto("fotoMembrana", "membrana.jpg");
const urlBequer = await uploadFoto("fotoBequer", "bequer.jpg");

await updateDoc(docRef, {
fotoMembrana: urlMembrana,
fotoBequer: urlBequer
});

if (statusCalculado === "Não Conforme") {
await updateDoc(doc(db, "mapeamentos", id), {
possuiNC: true
});
}

resultadoCalculado = null;
carregarAmostras();
};

async function carregarAmostras() {
const snapshot = await getDocs(collection(db, "mapeamentos", id, "amostras"));
const lista = document.getElementById("listaAmostras");
lista.innerHTML = "";

let total = 0;
let totalNC = 0;

snapshot.forEach(docSnap => {
const d = docSnap.data();
total++;
if (d.status === "Não Conforme") totalNC++;

const classe = d.status === "Não Conforme" ? "nc" : "ok";

lista.innerHTML += `
<tr class="${classe}">
<td>${d.criadoEm?.toDate().toLocaleString() || "-"}</td>
<td>${d.resultadoMgKg}</td>
<td>${d.status}</td>
<td>
${d.fotoMembrana ? `<a href="${d.fotoMembrana}" target="_blank">Membrana</a><br>` : ""}
${d.fotoBequer ? `<a href="${d.fotoBequer}" target="_blank">Béquer</a>` : ""}
</td>
</tr>`;
});

document.getElementById("resumo").innerHTML =
`Total: ${total} | Não Conformes: ${totalNC}`;
}

window.voltar = () => window.location.href = "dashboard.html";
</script>

</body>
</html>
