<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Dashboard - InsoMetric</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    button { padding: 8px 12px; margin: 5px 0; cursor: pointer; }
    input, select { padding: 6px; margin: 5px 0; width: 100%; }
    .card { border: 1px solid #ccc; padding: 10px; margin: 10px 0; }
    .form-box { border: 1px solid #aaa; padding: 15px; margin-bottom: 20px; }
  </style>
</head>
<body>

  <h2>InsoMetric - Mapeamentos</h2>

  <div class="form-box">
    <h3>Novo Mapeamento</h3>

    <input type="text" id="armazem" placeholder="Nome do Armazém">
    <input type="text" id="cliente" placeholder="Cliente">
    
    <select id="limite">
      <option value="250">250 mg/kg</option>
      <option value="500">500 mg/kg</option>
    </select>

    <input type="text" id="analista" placeholder="Nome do Analista">

    <button onclick="criarMapeamento()">Salvar Mapeamento</button>
  </div>

  <button onclick="logout()">Sair</button>

  <hr>

  <h3>Mapeamentos Ativos</h3>
  <div id="lista"></div>

  <script type="module">
    import { auth, db } from "./js/firebase-config.js";
    import { onAuthStateChanged, signOut }
      from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
    import {
      collection,
      addDoc,
      getDocs,
      query,
      orderBy,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

    const lista = document.getElementById("lista");

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = "login.html";
      } else {
        carregarMapeamentos();
      }
    });

    window.logout = function() {
      signOut(auth).then(() => {
        window.location.href = "login.html";
      });
    };

    window.criarMapeamento = async function() {
      const armazem = document.getElementById("armazem").value;
      const cliente = document.getElementById("cliente").value;
      const limite = parseInt(document.getElementById("limite").value);
      const analista = document.getElementById("analista").value;

      if (!armazem || !cliente || !analista) {
        alert("Preencha todos os campos.");
        return;
      }

      await addDoc(collection(db, "mapeamentos"), {
        armazem,
        cliente,
        limite,
        analista,
        criadoEm: serverTimestamp(),
        status: "ativo"
      });

      document.getElementById("armazem").value = "";
      document.getElementById("cliente").value = "";
      document.getElementById("analista").value = "";

      carregarMapeamentos();
    };

    async function carregarMapeamentos() {
      lista.innerHTML = "";
      const q = query(collection(db, "mapeamentos"), orderBy("criadoEm", "desc"));
      const snapshot = await getDocs(q);

      snapshot.forEach(docSnap => {
        const data = docSnap.data();
        const id = docSnap.id;

        lista.innerHTML += `
          <div class="card">
            <strong>${data.armazem}</strong><br>
            Cliente: ${data.cliente}<br>
            Limite: ${data.limite} mg/kg<br>
            Analista: ${data.analista}<br>
            Status: ${data.status}<br><br>
            <button onclick="abrirMapeamento('${id}')">
              Abrir Análises
            </button>
          </div>
        `;
      });
    }

    window.abrirMapeamento = function(id) {
      window.location.href = `amostras.html?id=${id}`;
    };
  </script>

</body>
</html>
