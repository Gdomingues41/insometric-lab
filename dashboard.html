<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InsoMetric - Painel</title>

<style>

/* ===== RESET ===== */
* {
  box-sizing: border-box;
}

html, body {
  margin: 0;
  padding: 0;
  overflow-x: hidden;
}

/* ===== VARIÁVEIS TEMA ===== */
:root {
  --bg: #121212;
  --card: #2A2F38;
  --text: #EAEAEA;
  --input-bg: #1C1F26;
  --border: #444;
  --primary: #0B3D91;
}

body.light {
  --bg: #F4F6F7;
  --card: #ffffff;
  --text: #2C3E50;
  --input-bg: #ffffff;
  --border: #ccc;
  --primary: #1B4F72;
}

/* ===== BASE ===== */
body {
  font-family: Arial, sans-serif;
  padding: 15px;
  background-color: var(--bg);
  color: var(--text);
  transition: 0.3s;
}

h2 {
  font-size: 22px;
  margin-bottom: 15px;
}

h3 {
  font-size: 18px;
  margin-bottom: 10px;
}

/* ===== CARDS ===== */
.box, .card {
  background: var(--card);
  padding: 18px;
  border-radius: 10px;
  margin-bottom: 20px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.3);
}

/* ===== INPUTS ===== */
input {
  width: 100%;
  padding: 14px;
  margin: 8px 0;
  font-size: 16px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background-color: var(--input-bg);
  color: var(--text);
}

/* ===== BOTÕES ===== */
button {
  width: 100%;
  padding: 14px;
  font-size: 16px;
  border-radius: 8px;
  border: none;
  margin-top: 10px;
  cursor: pointer;
  background-color: var(--primary);
  color: white;
  font-weight: bold;
}

button:hover {
  opacity: 0.9;
}

.toggle {
  background-color: #555;
}

.logout {
  background-color: #444;
}

/* ===== STATUS ===== */
.status-nc { border-left: 6px solid #E74C3C; }
.status-ok { border-left: 6px solid #2ECC71; }

/* ===== DESKTOP ===== */
@media (min-width: 768px) {
  body {
    max-width: 900px;
    margin: auto;
  }
  button {
    width: auto;
  }
}

</style>
</head>

<body>

<button class="toggle" onclick="toggleTheme()">🌙 / ☀️ Alternar Tema</button>

<h2>📦 InsoMetric - Painel do Dia</h2>

<div class="box">
<h3>➕ Novo Mapeamento</h3>

<input type="text" id="armazem" placeholder="Nome do Armazém">
<input type="text" id="cliente" placeholder="Cliente">

<input type="number" id="limite" placeholder="Limite mg/kg (ex: 125)">

<input type="text" id="analista" placeholder="Nome do Analista">

<button onclick="criarMapeamento()">Salvar Mapeamento</button>
</div>

<button class="logout" onclick="logout()">🚪 Sair</button>

<h3>📊 Mapeamentos Ativos</h3>
<div id="lista"></div>

<script type="module">

import { auth, db } from "./js/firebase-config.js";
import { onAuthStateChanged, signOut }
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
import {
collection, addDoc, getDocs, query, orderBy, serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const lista = document.getElementById("lista");

onAuthStateChanged(auth, async (user) => {
  if (!user) {
    window.location.href = "login.html";
  } else {
    carregarMapeamentos();
  }
});

window.logout = function() {
  signOut(auth).then(() => {
    window.location.href = "login.html";
  });
};

window.criarMapeamento = async function() {

  const armazem = document.getElementById("armazem").value;
  const cliente = document.getElementById("cliente").value;
  const limite = parseFloat(document.getElementById("limite").value);
  const analista = document.getElementById("analista").value;

  if (!armazem || !cliente || !analista || !limite) {
    alert("Preencha todos os campos.");
    return;
  }

  await addDoc(collection(db, "mapeamentos"), {
    armazem,
    cliente,
    limite,
    analista,
    criadoEm: serverTimestamp(),
    status: "ativo",
    possuiNC: false
  });

  document.getElementById("armazem").value = "";
  document.getElementById("cliente").value = "";
  document.getElementById("limite").value = "";
  document.getElementById("analista").value = "";

  carregarMapeamentos();
};

async function carregarMapeamentos() {

  lista.innerHTML = "";

  const q = query(collection(db, "mapeamentos"), orderBy("criadoEm", "desc"));
  const snapshot = await getDocs(q);

  snapshot.forEach(docSnap => {

    const data = docSnap.data();
    const id = docSnap.id;

    const classe = data.possuiNC ? "status-nc" : "status-ok";

    lista.innerHTML += `
      <div class="card ${classe}">
        <strong>${data.armazem}</strong>
        Cliente: ${data.cliente}<br>
        Limite: ${data.limite} mg/kg<br>
        Analista: ${data.analista}<br><br>

        <button onclick="abrirMapeamento('${id}')">
          Abrir Análises
        </button>
      </div>
    `;
  });
}

window.abrirMapeamento = function(id) {
  window.location.href = `amostras.html?id=${id}`;
};

</script>

<script>
function toggleTheme() {
  document.body.classList.toggle("light");
  localStorage.setItem("theme",
    document.body.classList.contains("light") ? "light" : "dark");
}

window.onload = function() {
  const theme = localStorage.getItem("theme");
  if (theme === "light") {
    document.body.classList.add("light");
  }
};
</script>

</body>
</html>
