<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Dashboard - InsoMetric</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    button { padding: 8px 12px; margin: 5px 0; }
    .card { border: 1px solid #ccc; padding: 10px; margin: 5px 0; }
  </style>
</head>
<body>

  <h2>InsoMetric - Mapeamentos</h2>

  <button onclick="criarMapeamento()">➕ Novo Mapeamento</button>
  <button onclick="logout()">Sair</button>

  <hr>

  <div id="lista"></div>

  <script type="module">
    import { auth, db } from "./js/firebase-config.js";
    import { onAuthStateChanged, signOut }
      from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
    import {
      collection,
      addDoc,
      getDocs,
      query,
      orderBy,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

    const lista = document.getElementById("lista");

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = "login.html";
      } else {
        carregarMapeamentos();
      }
    });

    window.logout = function() {
      signOut(auth).then(() => {
        window.location.href = "login.html";
      });
    };

    window.criarMapeamento = async function() {
      const nome = prompt("Nome do Armazém:");
      if (!nome) return;

      await addDoc(collection(db, "mapeamentos"), {
        armazem: nome,
        criadoEm: serverTimestamp(),
        status: "ativo"
      });

      carregarMapeamentos();
    };

    async function carregarMapeamentos() {
      lista.innerHTML = "";
      const q = query(collection(db, "mapeamentos"), orderBy("criadoEm", "desc"));
      const snapshot = await getDocs(q);

      snapshot.forEach(doc => {
        const data = doc.data();
        lista.innerHTML += `
          <div class="card">
            <strong>${data.armazem}</strong><br>
            Status: ${data.status}
          </div>
        `;
      });
    }
  </script>

</body>
</html>
