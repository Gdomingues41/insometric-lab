<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InsoMetric - Login</title>

<style>
:root {
    --azul-principal: #1f3f75;
    --azul-hover: #16325e;
    --cinza-fundo: #f2f4f7;
    --cinza-card: #ffffff;
    --texto-secundario: #555;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, Helvetica, sans-serif;
}

body {
    background-color: var(--cinza-fundo);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    padding: 15px;
}

.container {
    background: var(--cinza-card);
    padding: 40px 30px;
    border-radius: 12px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.08);
    width: 100%;
    max-width: 420px;
    text-align: center;
}

.logo-login {
    width: 170px;
    margin-bottom: 15px;
}

h1 {
    font-size: 26px;
    margin-bottom: 8px;
    color: #000;
}

.subtitulo {
    font-size: 15px;
    color: var(--texto-secundario);
    margin-bottom: 25px;
}

input {
    width: 100%;
    padding: 14px;
    margin-bottom: 15px;
    border-radius: 6px;
    border: 1px solid #ccc;
    font-size: 15px;
}

input:focus {
    outline: none;
    border-color: var(--azul-principal);
}

button {
    width: 100%;
    padding: 14px;
    background-color: var(--azul-principal);
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 16px;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    background-color: var(--azul-hover);
}

@media (max-width: 480px) {
    .container {
        padding: 30px 20px;
    }

    .logo-login {
        width: 140px;
    }

    h1 {
        font-size: 22px;
    }

    .subtitulo {
        font-size: 14px;
    }
}
</style>
</head>

<body>

<div class="container">

    <img src="img/logo-insometric.png" alt="InsoMetric Logo" class="logo-login">

    <h1>InsoMetric</h1>
    <p class="subtitulo">
        Sistema Técnico de Monitoramento de Resíduo Insolúvel
    </p>

    <input type="email" placeholder="E-mail">
    <input type="password" placeholder="Senha">

    <button>Entrar</button>

</div>

</body>
</html>
